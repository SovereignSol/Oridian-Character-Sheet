<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Character Sheet</title>
  <style>
    :root{--bg:#0b0f14;--panel:rgba(18,26,35,.92);--border:#223041;--text:#e9eef5;--muted:#97a6b8;--accent:rgba(124,230,165,.65);}
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;}
    header{max-width:1200px;margin:0 auto;padding:14px 14px 6px;}
    h1{margin:0;font-size:20px;font-weight:900}
    .wrap{max-width:1200px;margin:0 auto;padding:0 14px 18px}
    .panel{margin-top:10px;border-radius:16px;border:1px solid var(--border);background:var(--panel);overflow:hidden;}
    .topBar{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:10px 12px;border-bottom:1px solid var(--border);background:rgba(0,0,0,.10)}
    .row{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
    .btn{padding:9px 10px;border-radius:12px;border:1px solid var(--border);background:rgba(26,39,53,.9);color:var(--text);cursor:pointer}
    .btn:disabled{opacity:.5;cursor:not-allowed}
    .tabs{display:flex;gap:8px;flex-wrap:wrap;padding:10px 12px;border-bottom:1px solid var(--border)}
    .tab{padding:8px 10px;border-radius:999px;border:1px solid var(--border);background:rgba(0,0,0,.12);color:var(--text);cursor:pointer;font-size:12px}
    .tab.active{outline:2px solid var(--accent)}
    .content{padding:12px}
    .grid2{display:grid;grid-template-columns:1fr;gap:12px}
    .box{border:1px solid var(--border);border-radius:16px;background:rgba(0,0,0,.14);overflow:hidden}
    .boxHead{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:10px 12px;border-bottom:1px solid var(--border)}
    .boxTitle{font-weight:900}
    .boxBody{padding:12px}
    label.field{display:grid;gap:6px}
    .lbl{color:var(--muted);font-size:12px}
    input,textarea,select{width:100%;padding:10px 10px;border-radius:12px;border:1px solid var(--border);background:rgba(15,22,32,.95);color:var(--text);outline:none}
    textarea{min-height:140px;resize:vertical}
    .note{margin-top:10px;color:var(--muted);font-size:12px;line-height:1.4}
    .pill{padding:7px 10px;border:1px solid var(--border);border-radius:999px;color:var(--muted);font-size:12px;display:flex;align-items:center;gap:8px;background:rgba(0,0,0,.10)}
    .kpi{font-weight:1000;font-size:14px}
    .smallCard{border:1px solid var(--border);border-radius:14px;padding:8px;background:rgba(0,0,0,.12)}
    .smallLabel{color:var(--muted);font-size:12px}
    .smallValue{margin-top:6px;display:flex;align-items:center;justify-content:space-between;gap:8px}
    .abilitiesGrid{display:grid;grid-template-columns:1fr;gap:10px}
    .abilityCard{border:1px solid var(--border);border-radius:16px;padding:12px;background:rgba(0,0,0,.16)}
    .abilityName{font-weight:900;color:var(--muted)}
    .abilityMod{margin-top:8px;font-size:18px;font-weight:900}
    .skillsGrid{display:grid;grid-template-columns:1fr;gap:8px}
    .skillRow{border:1px solid var(--border);border-radius:14px;padding:10px;background:rgba(0,0,0,.14);display:grid;grid-template-columns:1fr;gap:10px}
    .skillLeft{display:flex;justify-content:space-between;gap:10px;align-items:baseline}
    .skillName{font-weight:900}
    .skillMeta{color:var(--muted);font-size:12px}
    .skillMid{display:flex;gap:8px;flex-wrap:wrap}
    .skillBtn{padding:8px 10px;border-radius:12px;border:1px solid var(--border);background:rgba(26,39,53,.65);color:var(--text);cursor:pointer;font-size:12px}
    .skillBtn.active{outline:2px solid var(--accent)}
    .chip{display:inline-flex;align-items:center;gap:8px;padding:8px 10px;border:1px solid var(--border);border-radius:999px;background:rgba(0,0,0,.10);margin:6px 6px 0 0}
    .chipX{border:none;background:transparent;color:var(--muted);cursor:pointer;font-size:14px}
    .modalBackdrop{position:fixed;inset:0;background:rgba(0,0,0,.65);display:none;align-items:flex-end;justify-content:center;padding:14px}
    .modal{width:100%;max-width:980px;border:1px solid var(--border);background:rgba(18,26,35,.98);border-radius:16px;overflow:hidden}
    .modalHead{display:flex;justify-content:space-between;align-items:center;padding:12px;border-bottom:1px solid var(--border)}
    .modalBody{padding:12px;max-height:70vh;overflow:auto}
    .modalBackdrop.show{display:flex}
    .cols2fixed{display:grid;grid-template-columns:1fr 1fr;gap:12px;align-items:start}
    .spellCol{border:1px solid var(--border);border-radius:16px;padding:10px;background:rgba(0,0,0,.12);min-height:40px}
    .spellRow{display:flex;justify-content:space-between;gap:10px;align-items:center;padding:8px;border-bottom:1px solid rgba(255,255,255,.06);cursor:pointer}
    .spellRow:last-child{border-bottom:none}
    .spellName{font-weight:800}
    .spellMeta2{color:var(--muted);font-size:12px}
    .equipCols{display:grid;grid-template-columns:1fr;gap:12px}
    .portraitBox{border:1px dashed var(--border);border-radius:16px;min-height:320px;display:flex;align-items:center;justify-content:center;color:var(--muted);background:rgba(0,0,0,.10);position:relative;overflow:hidden}
    .portraitBox img{width:100%;height:100%;object-fit:cover}
    .equipGroup{border:1px solid var(--border);border-radius:16px;background:rgba(0,0,0,.10);padding:10px}
    .equipTitle{font-weight:900;margin-bottom:8px}
    .equipSlot{border:1px solid var(--border);border-radius:14px;padding:10px;background:rgba(0,0,0,.14);margin-top:10px}
    .equipGrid{display:grid;grid-template-columns:1fr;gap:10px}
    .iconPlus{font-weight:1000}
    @media (min-width:900px){
      .grid2{grid-template-columns:1.25fr .75fr}
      .abilitiesGrid{grid-template-columns:1fr 1fr 1fr}
      .skillsGrid{grid-template-columns:1fr 1fr}
      .skillRow{grid-template-columns:1.2fr 1.6fr .4fr}
      .equipCols{grid-template-columns:1fr .9fr 1fr}
      .equipGrid{grid-template-columns:1fr 1fr}
    }
  </style>
</head>
<body>
  <header><h1>Character Sheet</h1></header>

  <div class="wrap">
    <div class="panel">
      <div class="topBar">
        <div class="kpi">Character Sheet</div>
        <div class="row">
          <button class="btn" id="shortRestBtn" type="button">Short Rest</button>
          <button class="btn" id="longRestBtn" type="button">Long Rest</button>
          <button class="btn" id="cloudSaveBtn" type="button">Save to Cloud</button>
          <button class="btn" id="cloudLoadBtn" type="button">Load from Cloud</button>
          <a class="btn" href="index.html" style="text-decoration:none;display:inline-flex;align-items:center;justify-content:center">Back</a>
        </div>
      </div>

      <div class="tabs">
        <button class="tab active" data-tab="core" type="button">Core</button>
        <button class="tab" data-tab="details" type="button">Details</button>
        <button class="tab" data-tab="spells" type="button">Spells</button>
        <button class="tab" data-tab="equipment" type="button">Equipment</button>
        <button class="tab" data-tab="notes" type="button">Notes</button>
      </div>

      <div class="content" id="root"></div>
    </div>
  </div>

  <div class="modalBackdrop" id="modal">
    <div class="modal">
      <div class="modalHead">
        <div class="kpi" id="modalTitle">Modal</div>
        <button class="btn" id="modalClose" type="button">Close</button>
      </div>
      <div class="modalBody" id="modalBody"></div>
    </div>
  </div>

  <script type="module">
    import {
      abilityList, skillMeta,
      loadCharacterState, saveCharacterState,
      abilityMod, proficiencyBonus, formatSigned,
      saveBonus, skillBonus, passivePerception, initiative
    } from "./js/character.js";
    import { clampInt, safeText } from "./js/util.js";
    import { earnedPickSlots } from "./js/progression.js";
    import { cloudSave, cloudLoad, isCloudConfigured } from "./js/cloud.js";
    import { applyBackgroundToState } from "./js/backgrounds.js";
    import { defaultEquipment, computeEquipmentAcBonus, getEquippedWeaponDice } from "./js/equipment.js";
    import { applyShortRestHitDice, applyLongRest, defaultHitDicePools } from "./js/rest.js";
    import { applyEffects } from "./js/effects.js";
    import {
      classSpellIdsUpToLevel, isPreparedCaster, isKnownCaster, maxSpellLevelFor,
      getSubclassPreparedByLevel
    } from "./js/spells_engine.js";

    const root = document.getElementById("root");
    const modal = document.getElementById("modal");
    const modalTitle = document.getElementById("modalTitle");
    const modalBody = document.getElementById("modalBody");
    const modalClose = document.getElementById("modalClose");
    const shortRestBtn = document.getElementById("shortRestBtn");
    const longRestBtn = document.getElementById("longRestBtn");
    const cloudSaveBtn = document.getElementById("cloudSaveBtn");
    const cloudLoadBtn = document.getElementById("cloudLoadBtn");

    let page = "core";
    let state = loadCharacterState();

    let DATA = {
      backgrounds:null, classes:null, subclasses:null, traits:null,
      spellcasting:null, spells:null, diceImages:null
    };

    function el(tag, attrs={}, children=[]){
      const n = document.createElement(tag);
      for (const [k,v] of Object.entries(attrs)){
        if (k === "class") n.className = v;
        else if (k.startsWith("on") && typeof v === "function") n.addEventListener(k.slice(2).toLowerCase(), v);
        else if (v === true) n.setAttribute(k, "");
        else if (v !== false && v != null) n.setAttribute(k, String(v));
      }
      for (const c of children){
        if (c == null) continue;
        if (typeof c === "string") n.appendChild(document.createTextNode(c));
        else n.appendChild(c);
      }
      return n;
    }
    function field(label, control){
      return el("label", { class:"field" }, [ el("div", { class:"lbl" }, [label]), control ]);
    }
    function box(title, right, body){
      return el("section", { class:"box" }, [
        el("div", { class:"boxHead" }, [
          el("div", { class:"boxTitle" }, [title]),
          right || el("div")
        ]),
        el("div", { class:"boxBody" }, body)
      ]);
    }
    function showModal(title, bodyEl){
      modalTitle.textContent = title;
      modalBody.innerHTML = "";
      modalBody.appendChild(bodyEl);
      modal.classList.add("show");
    }
    function closeModal(){ modal.classList.remove("show"); modalBody.innerHTML=""; }
    modalClose.addEventListener("click", closeModal);
    modal.addEventListener("click", (e)=>{ if (e.target === modal) closeModal(); });

    function notifyCombat(){
      try { window.localStorage.setItem("dnd_character_state_v1", JSON.stringify(state)); } catch {}
      try { window.postMessage({ type: "CHAR_SHEET_UPDATED" }, "*"); } catch {}
    }

    function pushRestCommand(cmd){
      try { localStorage.setItem("dnd_rest_command_v1", JSON.stringify({ cmd, at: Date.now() })); } catch {}
      notifyCombat();
    }

    function writeState(next){
      state = saveCharacterState(next);
      const acBonus = computeEquipmentAcBonus(state.equipment || defaultEquipment());
      const weaponDice = getEquippedWeaponDice(state.equipment || defaultEquipment());
      state = saveCharacterState({ ...state, combat: { ...state.combat, acBonusExtra: acBonus, weaponDice }});
      notifyCombat();
    }

    async function loadJson(path){
      const r = await fetch(path, { cache:"no-store" });
      if (!r.ok) throw new Error(`Failed to load ${path}`);
      return await r.json();
    }
    async function ensureData(){
      if (!DATA.backgrounds) DATA.backgrounds = await loadJson("./data/backgrounds.json");
      if (!DATA.classes) DATA.classes = await loadJson("./data/classes.json");
      if (!DATA.subclasses) DATA.subclasses = await loadJson("./data/subclasses.json");
      if (!DATA.traits) DATA.traits = await loadJson("./data/traits.json");
      if (!DATA.spellcasting) DATA.spellcasting = await loadJson("./data/spellcasting.json");
      if (!DATA.spells) DATA.spells = await loadJson("./data/spells.json");
      if (!DATA.diceImages) DATA.diceImages = await loadJson("./data/dice_images.json");
    }

    document.querySelectorAll(".tab").forEach(t=>{
      t.addEventListener("click", ()=>{
        page = t.getAttribute("data-tab");
        document.querySelectorAll(".tab").forEach(x=>x.classList.toggle("active", x===t));
        render();
      });
    });

    cloudSaveBtn.disabled = !isCloudConfigured();
    cloudLoadBtn.disabled = !isCloudConfigured();
    cloudSaveBtn.addEventListener("click", async ()=> alert((await cloudSave()).message));
    cloudLoadBtn.addEventListener("click", async ()=>{
      const r = await cloudLoad();
      alert(r.message);
      state = loadCharacterState();
      render();
    });

    shortRestBtn.addEventListener("click", ()=> openHitDiceModal());
    longRestBtn.addEventListener("click", ()=>{
      writeState(applyLongRest(state));
      pushRestCommand("long");
      render();
    });

    function skillBtn(label, active, onClick){
      return el("button", { type:"button", class: "skillBtn" + (active ? " active" : ""), onclick:onClick }, [label]);
    }

    function openHitDiceModal(){
      const pools = state.rest?.hitDice || defaultHitDicePools(state);
      const spend = {};
      const wrap = el("div", {}, [
        el("div", { class:"note" }, ["Short Rest: enter how many hit dice you spend. Total spent is added to current HP. Dice remain spent until Long Rest."])
      ]);

      for (const die of Object.keys(pools)) {
        const p = pools[die];
        const inp = el("input", { type:"number", min:"0", value:"0", oninput:(e)=>{ spend[die] = e.target.value; }});
        wrap.appendChild(el("div", { class:"smallCard", style:"margin-top:10px" }, [
          el("div", { class:"smallLabel" }, [`${die.toUpperCase()} remaining: ${p.remaining}/${p.max}`]),
          field("Spend", inp),
        ]));
      }

      const accept = el("button", { class:"btn", type:"button", style:"margin-top:12px", onclick:()=>{
        writeState(applyShortRestHitDice(state, spend));
        pushRestCommand("short");
        closeModal();
        render();
      }}, ["Accept"]);

      wrap.appendChild(accept);
      showModal("Short Rest: Recovery Dice", wrap);
    }

    function openPickModal(){
      const earned = earnedPickSlots(state);
      const used = Array.isArray(state.picks) ? state.picks.length : 0;
      const available = Math.max(0, earned - used);

      const wrap = el("div", {}, [ el("div", { class:"note" }, [`Available picks: ${available}. Add a feat/feature or take an ASI.`]) ]);
      if (available <= 0) { showModal("Add Pick", wrap); return; }

      const addTraitBtn = el("button", { class:"btn", type:"button", onclick:()=>renderFeatPicker() }, ["Add Feat or Feature"]);
      const addAsiBtn = el("button", { class:"btn", type:"button", onclick:()=>renderAsiPicker() }, ["Take ASI"]);
      wrap.appendChild(el("div", { class:"row", style:"margin-top:10px" }, [addTraitBtn, addAsiBtn]));

      function traitApplicable(it){
        const appl = it.applicableClasses || ["any"];
        if (!Array.isArray(appl) || appl.length===0) return true;
        if (appl.includes("any")) return true;
        const c1 = state.primary?.className;
        const c2 = state.secondary?.className;
        return appl.includes(c1) || appl.includes(c2);
      }

      function renderFeatPicker(){
        const inner = el("div", {}, [ el("div", { class:"note" }, ["Requirements are shown. You decide if you qualify. Effects (if present in JSON) are applied automatically."]) ]);
        const items = (DATA.traits?.items || []).filter(traitApplicable);
        const sel = el("select", {}, [el("option", { value:"" }, ["Select..."])]);
        for (const it of items) sel.appendChild(el("option", { value: it.id }, [`${it.name} (${it.type||"item"})`]));
        const req = el("div", { class:"note" }, [""]);
        const addBtn = el("button", { class:"btn", type:"button", disabled:true }, ["Add"]);

        sel.addEventListener("change", ()=>{
          const it = items.find(x=>x.id===sel.value);
          req.textContent = it?.requirementsText || "";
          addBtn.disabled = !it;
        });
        addBtn.addEventListener("click", ()=>{
          const it = items.find(x=>x.id===sel.value);
          if (!it) return;
          let next = { ...state, picks:[...(state.picks||[]), { kind:"trait", id: it.id, name: it.name, type: it.type||"item" }]};
          next = applyEffects(next, it.effects);
          writeState(next);
          closeModal(); render();
        });

        inner.appendChild(field("Feat or feature", sel));
        inner.appendChild(req);
        inner.appendChild(el("div", { class:"row", style:"margin-top:10px" }, [addBtn]));
        showModal("Add Pick: Feat/Feature", inner);
      }

      function renderAsiPicker(){
        const inner = el("div", {}, [ el("div", { class:"note" }, ["ASI: +2 to one ability, or +1 to two different abilities. Cap enforced at 20."]) ]);
        const mode = el("select", {}, [
          el("option", { value:"plus2" }, ["+2 to one ability"]),
          el("option", { value:"plus1plus1" }, ["+1 to two abilities"]),
        ]);
        const a1 = el("select", {}, [el("option", { value:"" }, ["Select ability..."]), ...abilityList.map(a => el("option", { value:a }, [a]))]);
        const a2 = el("select", { disabled:true }, [el("option", { value:"" }, ["Select second ability..."]), ...abilityList.map(a => el("option", { value:a }, [a]))]);
        mode.addEventListener("change", ()=>{ a2.disabled = mode.value !== "plus1plus1"; });

        const applyBtn = el("button", { class:"btn", type:"button" }, ["Apply ASI"]);
        applyBtn.addEventListener("click", ()=>{
          const m = mode.value;
          const first = a1.value;
          const second = a2.value;
          if (!first) return alert("Pick an ability.");
          if (m==="plus1plus1" && (!second || second===first)) return alert("Pick two different abilities.");

          const nextAbilities = { ...state.abilities };
          if (m==="plus2") nextAbilities[first] = Math.min(20, (nextAbilities[first]||0)+2);
          else { nextAbilities[first] = Math.min(20, (nextAbilities[first]||0)+1); nextAbilities[second] = Math.min(20, (nextAbilities[second]||0)+1); }

          writeState({ ...state, abilities: nextAbilities, picks:[...(state.picks||[]), { kind:"asi", mode:m, a1:first, a2: (m==="plus1plus1")?second:null }]});
          closeModal(); render();
        });

        inner.appendChild(field("ASI type", mode));
        inner.appendChild(field("Ability", a1));
        inner.appendChild(field("Second ability", a2));
        inner.appendChild(el("div", { class:"row", style:"margin-top:10px" }, [applyBtn]));
        showModal("Add Pick: ASI", inner);
      }

      showModal("Add Pick", wrap);
    }

    function classBlock(isSecondary){
      const data = isSecondary ? state.secondary : state.primary;
      if (isSecondary && !state.multiclass) return null;
      const title = state.multiclass ? (isSecondary ? "Class 2" : "Class 1") : "Class";

      const classSelect = el("select", { onchange:(e)=>{
        const className = e.target.value;
        const next = { ...data, className, subclass:"", subclassPackageUrl:"" };
        if (isSecondary) writeState({ ...state, secondary: next });
        else writeState({ ...state, primary: next });
        render();
      }}, [el("option", { value:"" }, ["Select class..."])]);

      for (const c of (DATA.classes || [])) {
        classSelect.appendChild(el("option", { value:c.name, selected:(c.name===data.className)?true:null }, [c.name]));
      }

      const subclassSelect = el("select", { onchange:(e)=>{
        const subName = e.target.value;
        const entry = (DATA.subclasses?.classes||[]).find(x=>x.class===data.className);
        const sub = (entry?.subclasses||[]).find(x=>x.name===subName) || null;
        const next = { ...data, subclass: subName, subclassPackageUrl: (sub?.packageUrl||"") };
        if (isSecondary) writeState({ ...state, secondary: next });
        else writeState({ ...state, primary: next });
        render();
      }}, [el("option", { value:"" }, ["Select subclass..."])]);

      const subEntry = (DATA.subclasses?.classes||[]).find(x=>x.class===data.className);
      const subs = Array.isArray(subEntry?.subclasses) ? subEntry.subclasses : [];
      for (const s of subs) subclassSelect.appendChild(el("option", { value:s.name, selected:(s.name===data.subclass)?true:null }, [s.name]));

      const levelInput = el("input", { type:"number", min:"0", max:"20", value:data.classLevel, oninput:(e)=>{
        const v = clampInt(e.target.value, 0, 20);
        const next = { ...data, classLevel: v };
        if (isSecondary) writeState({ ...state, secondary: next });
        else writeState({ ...state, primary: next });
        render();
      }});

      const spellModInput = el("input", { type:"number", value:data.spellMod, oninput:(e)=>{
        const v = clampInt(e.target.value, -10, 20);
        const next = { ...data, spellMod: v };
        if (isSecondary) writeState({ ...state, secondary: next });
        else writeState({ ...state, primary: next });
      }});

      return box(title, null, [
        el("div", { class:"grid2", style:"grid-template-columns:1fr 1fr;gap:10px" }, [
          field("Class", classSelect),
          field("Class level", levelInput),
          field("Subclass", subclassSelect),
          field("Spellcasting modifier (if applicable)", spellModInput),
        ]),
      ]);
    }

    function renderCore(){
      const header = box("Header", null, [
        el("div", { class:"grid2", style:"grid-template-columns:1fr 1fr 1fr;gap:10px" }, [
          field("Character name", el("input", { value: state.name, oninput:(e)=> writeState({ ...state, name: e.target.value }) })),
          field("Race", el("input", { value: state.race, oninput:(e)=> writeState({ ...state, race: e.target.value }) })),
          field("Alignment", el("input", { value: state.alignment, oninput:(e)=> writeState({ ...state, alignment: e.target.value }) })),
        ])
      ]);

      const bgSelect = el("select", { onchange:(e)=>{
        const id = e.target.value;
        const bg = (DATA.backgrounds?.backgrounds||[]).find(b=>b.id===id) || null;
        if (!bg) { writeState({ ...state, backgroundId:"", backgroundName:"" }); render(); return; }
        writeState(applyBackgroundToState(state, bg));
        render();
      }}, [el("option",{value:""},["Select background..."])]);

      for (const b of (DATA.backgrounds?.backgrounds||[])) {
        bgSelect.appendChild(el("option",{value:b.id, selected:(b.id===state.backgroundId)?true:null},[b.name]));
      }

      const pb = proficiencyBonus(state.level) + clampInt(state.proficiencyMisc, -10, 20);
      const pp = passivePerception(state);
      const init = initiative(state);

      const quick = box("Quick Stats", null, [
        el("div", { class:"grid2", style:"grid-template-columns:repeat(4,1fr);gap:10px" }, [
          el("div", { class:"smallCard" }, [
            el("div", { class:"smallLabel" }, ["Inspiration"]),
            el("div", { class:"smallValue" }, [
              el("button", { class:"btn", type:"button", onclick:()=> writeState({ ...state, inspirationPoints: clampInt((state.inspirationPoints||0)-1,0,99)}) }, ["-"]),
              el("div", { class:"kpi" }, [String(state.inspirationPoints||0)]),
              el("button", { class:"btn", type:"button", onclick:()=> writeState({ ...state, inspirationPoints: clampInt((state.inspirationPoints||0)+1,0,99)}) }, ["+"]),
            ])
          ]),
          el("div", { class:"smallCard" }, [ el("div", { class:"smallLabel" }, ["Proficiency"]), el("div", { class:"smallValue" }, [el("div", { class:"kpi" }, [formatSigned(pb)])]) ]),
          el("div", { class:"smallCard" }, [ el("div", { class:"smallLabel" }, ["Passive Perception"]), el("div", { class:"smallValue" }, [el("div", { class:"kpi" }, [String(pp)])]) ]),
          el("div", { class:"smallCard" }, [ el("div", { class:"smallLabel" }, ["Initiative"]), el("div", { class:"smallValue" }, [el("div", { class:"kpi" }, [formatSigned(init)])]) ]),
        ])
      ]);

      const left = box("Class and Background", null, [
        field("Background", bgSelect),
        el("div", { class:"row" }, [
          el("label", { class:"pill" }, [ el("input", { type:"checkbox", checked: state.multiclass?true:null, onchange:(e)=>{ writeState({ ...state, multiclass: e.target.checked }); render(); } }), "Multiclass" ]),
          el("div", { class:"pill" }, ["Total level: ", el("b",{},[String(state.level)])]),
        ]),
        classBlock(false),
        classBlock(true),
      ].filter(Boolean));

      const right = box("Combat", null, [
        el("div", { class:"grid2", style:"grid-template-columns:1fr 1fr;gap:10px" }, [
          field("Armor Class (base)", el("input", { type:"number", min:"0", value: state.combat.acBase, oninput:(e)=> writeState({ ...state, combat:{ ...state.combat, acBase: clampInt(e.target.value,0,99) } }) })),
          field("Speed", el("input", { type:"number", min:"0", value: state.combat.speed, oninput:(e)=> writeState({ ...state, combat:{ ...state.combat, speed: clampInt(e.target.value,0,999) } }) })),
          field("Max HP", el("input", { type:"number", min:"0", value: state.combat.hpMax, oninput:(e)=> { const v = clampInt(e.target.value,0,9999); const hpNow = Math.min(state.combat.hpNow, v); writeState({ ...state, combat:{ ...state.combat, hpMax: v, hpNow } }); }})),
          field("Current HP", el("input", { type:"number", min:"0", value: state.combat.hpNow, oninput:(e)=> writeState({ ...state, combat:{ ...state.combat, hpNow: clampInt(e.target.value,0,state.combat.hpMax) } }) })),
          field("Temp HP", el("input", { type:"number", min:"0", value: state.combat.hpTemp, oninput:(e)=> writeState({ ...state, combat:{ ...state.combat, hpTemp: clampInt(e.target.value,0,9999) } }) })),
          field("Initiative misc", el("input", { type:"number", value: state.combat.initiativeMisc, oninput:(e)=> writeState({ ...state, combat:{ ...state.combat, initiativeMisc: clampInt(e.target.value,-99,99) } }) })),
        ]),
        el("div", { class:"note" }, ["AC from equipment: ", el("b",{},[String(state.combat.acBonusExtra||0)]), " | Equipped weapon hit dice: ", el("b",{},[safeText(state.combat.weaponDice)||"(none)"])])
      ]);

      const top = el("div", { class:"grid2" }, [left, right]);

      const abil = box("Abilities and Saving Throws", null, [
        el("div", { class:"abilitiesGrid" }, abilityList.map(a => {
          const score = state.abilities[a];
          const mod = abilityMod(score);
          const saveProf = !!state.saves[a];
          const saveVal = saveBonus(state, a);

          return el("div", { class:"abilityCard" }, [
            el("div", { class:"abilityName" }, [a]),
            el("input", { type:"number", min:"1", max:"20", value: score, oninput:(e)=>{ writeState({ ...state, abilities:{ ...state.abilities, [a]: clampInt(e.target.value,1,20) } }); render(); }}),
            el("div", { class:"abilityMod" }, [formatSigned(mod)]),
            el("div", { class:"smallCard", style:"margin-top:10px" }, [
              el("div", { class:"smallLabel" }, ["Saving throw"]),
              el("div", { class:"smallValue" }, [
                el("label", { class:"pill" }, [ el("input", { type:"checkbox", checked: saveProf ? true : null, onchange:(e)=>{ writeState({ ...state, saves:{ ...state.saves, [a]: e.target.checked } }); render(); }}), "Proficient" ]),
                el("div", { class:"kpi" }, [formatSigned(saveVal)])
              ])
            ])
          ]);
        }))
      ]);

      const skills = box("Skills", null, [
        el("div", { class:"skillsGrid" }, skillMeta.map(s => {
          const lvl = Number(state.skills[s.id] || 0);
          return el("div", { class:"skillRow" }, [
            el("div", { class:"skillLeft" }, [el("div", { class:"skillName" }, [s.label]), el("div", { class:"skillMeta" }, [s.ability])]),
            el("div", { class:"skillMid" }, [
              skillBtn("None", lvl===0, ()=>{ writeState({ ...state, skills:{ ...state.skills, [s.id]:0 } }); render(); }),
              skillBtn("Prof", lvl===1, ()=>{ writeState({ ...state, skills:{ ...state.skills, [s.id]:1 } }); render(); }),
              skillBtn("Expert", lvl===2, ()=>{ writeState({ ...state, skills:{ ...state.skills, [s.id]:2 } }); render(); }),
            ]),
            el("div", { style:"display:flex;justify-content:flex-end;font-size:16px;font-weight:900" }, [formatSigned(skillBonus(state, s.id))]),
          ]);
        }))
      ]);

      const earned = earnedPickSlots(state);
      const used = Array.isArray(state.picks) ? state.picks.length : 0;
      const available = Math.max(0, earned - used);

      const picksRight = el("div", { class:"row" }, [
        el("div", { class:"pill" }, ["Available picks: ", el("b",{},[String(available)])]),
        el("button", { class:"btn", type:"button", onclick:()=>openPickModal() }, [el("span",{class:"iconPlus"},["+"]), " Add"])
      ]);

      const picksBody = [];
      if (used === 0) picksBody.push(el("div", { class:"note" }, ["No picks added yet."]));
      else {
        for (let i=0;i<state.picks.length;i++){
          const p = state.picks[i];
          const label = p.kind === "asi" ? (p.mode === "plus2" ? `ASI: +2 ${p.a1}` : `ASI: +1 ${p.a1} +1 ${p.a2}`) : `${p.name || p.id}`;
          picksBody.push(el("div", { class:"chip" }, [
            el("span", {}, [label]),
            el("button", { class:"chipX", type:"button", onclick:()=>{ const next = [...state.picks]; next.splice(i,1); writeState({ ...state, picks: next }); render(); }}, ["✕"])
          ]));
        }
      }

      const feats = box("Features and Traits", picksRight, [
        el("div", { class:"note" }, ["Unlocks at level 1 and at ASI/feat levels. Background features appear here automatically."]),
        el("div", {}, picksBody),
        el("div", { style:"margin-top:10px" }, [ ...(state.features||[]).map(f=> el("div", { class:"smallCard", style:"margin-top:10px" }, [ el("div", { class:"smallLabel" }, [safeText(f.name)]), el("div", { class:"note" }, [safeText(f.text)]) ])) ])
      ]);

      root.appendChild(header);
      root.appendChild(quick);
      root.appendChild(top);
      root.appendChild(abil);
      root.appendChild(skills);
      root.appendChild(feats);
    }

    function renderDetails(){
      root.appendChild(box("Details", null, [
        el("div", { class:"grid2", style:"grid-template-columns:1fr 1fr;gap:10px" }, [
          field("Appearance", el("textarea", { oninput:(e)=> writeState({ ...state, details:{ ...state.details, appearance: e.target.value }}) }, [state.details?.appearance || ""])),
          field("Backstory", el("textarea", { oninput:(e)=> writeState({ ...state, details:{ ...state.details, backstory: e.target.value }}) }, [state.details?.backstory || ""])),
          field("Allies and Organizations", el("textarea", { oninput:(e)=> writeState({ ...state, details:{ ...state.details, allies: e.target.value }}) }, [state.details?.allies || ""])),
          field("Treasure", el("textarea", { oninput:(e)=> writeState({ ...state, details:{ ...state.details, treasure: e.target.value }}) }, [state.details?.treasure || ""])),
        ]),
      ]));
    }

    function renderNotes(){
      root.appendChild(box("Notes", null, [
        field("Notes", el("textarea", { oninput:(e)=> writeState({ ...state, notes: e.target.value }) }, [state.notes || ""]))
      ]));
    }

    function renderEquipment(){
      const eq = state.equipment || defaultEquipment();
      function commitEq(){ writeState({ ...state, equipment:eq }); }

      async function pasteTo(textarea){
        try { textarea.value = await navigator.clipboard.readText(); }
        catch { alert("Clipboard paste blocked by browser."); }
      }

      function openItemModal(title, item){
        const ta = el("textarea", {}, [item.long || ""]);
        const pasteBtn = el("button", { class:"btn", type:"button", onclick: async ()=>{
          await pasteTo(ta);
          item.long = ta.value;
          commitEq();
        }}, ["Paste from clipboard"]);
        const saveBtn = el("button", { class:"btn", type:"button", onclick:()=>{ item.long = ta.value; commitEq(); closeModal(); }}, ["Save"]);
        const wrap = el("div", {}, [ field("Extended effect", ta), el("div",{class:"row",style:"margin-top:10px"},[pasteBtn, saveBtn]) ]);
        showModal(title, wrap);
      }

      function slotCard(item, title, opts){
        const grid = el("div",{class:"equipGrid"},[
          field("Name", el("input", { value:item.name||"", oninput:(e)=>{ item.name=e.target.value; commitEq(); }})),
          field("Short effect", el("input", { value:item.short||"", oninput:(e)=>{ item.short=e.target.value; commitEq(); }})),
        ]);
        if (opts.ac) grid.appendChild(field("AC", el("input", { value:item.acBonus||"", oninput:(e)=>{ item.acBonus=e.target.value; commitEq(); } })));
        if (opts.hitDice) grid.appendChild(field("Hit dice", el("input", { value:item.hitDice||"", oninput:(e)=>{ item.hitDice=e.target.value; commitEq(); } })));

        const openBtn = el("button", { class:"btn", type:"button", onclick:()=>openItemModal(title, item) }, ["Open"]);
        const footer = el("div",{class:"row",style:"margin-top:10px"},[openBtn]);

        if (opts.equipped) {
          const cb = el("input",{type:"checkbox", checked:item.equipped?true:null, onchange:(e)=>{
            const w = eq.slots.weapons;
            for (const x of w) x.equipped = false;
            item.equipped = e.target.checked;
            commitEq();
          }});
          footer.appendChild(el("label",{class:"pill"},[cb,"Equipped"]));
        }

        return el("div",{class:"equipSlot"},[grid,footer]);
      }

      function group(title, items, opts){
        return el("div",{class:"equipGroup"},[
          el("div",{class:"equipTitle"},[title]),
          ...items.map((it,idx)=>slotCard(it, `${title} ${idx+1}`, opts))
        ]);
      }

      const leftGroups = [
        group("Head", eq.slots.head, {}),
        group("Neck", eq.slots.neck, {}),
        group("Body/Armor", eq.slots.body, { ac:true }),
        group("Waist", eq.slots.waist, {}),
        group("Legs", eq.slots.legs, {}),
        group("Feet", eq.slots.feet, {}),
        group("Rings (right hand)", eq.slots.ringsRight, {}),
      ];

      function openBagModal(){
        const bag = eq.bag || (eq.bag={items:[]});
        const list = el("div", {}, []);
        function renderBag(){
          list.innerHTML = "";
          if (bag.items.length===0) list.appendChild(el("div",{class:"note"},["No bag items yet."]));
          bag.items.forEach((it, idx)=>{
            list.appendChild(el("div",{class:"smallCard",style:"margin-top:10px"},[
              field("Name", el("input",{value:it.name||"", oninput:(e)=>{it.name=e.target.value; commitEq();}})),
              field("Short", el("input",{value:it.short||"", oninput:(e)=>{it.short=e.target.value; commitEq();}})),
              el("div",{class:"row"},[
                el("button",{class:"btn",type:"button",onclick:()=>openItemModal("Bag item", it)},["Open"]),
                el("button",{class:"btn",type:"button",onclick:()=>{bag.items.splice(idx,1); commitEq(); renderBag();}},["Remove"])
              ])
            ]));
          });
        }
        const add = el("button",{class:"btn",type:"button",onclick:()=>{bag.items.push({name:"",short:"",long:""}); commitEq(); renderBag();}},["+ Add item"]);
        const wrap = el("div",{},[add,list]);
        renderBag();
        showModal("Bag", wrap);
      }

      const rightGroups = [
        group("Face", eq.slots.face, {}),
        group("Shoulders", eq.slots.shoulders, {}),
        group("Torso", eq.slots.torso, {}),
        group("Arms", eq.slots.arms, {}),
        group("Rings (left hand)", eq.slots.ringsLeft, {}),
        group("Shields", eq.slots.shields, { ac:true }),
        group("Weapons", eq.slots.weapons, { hitDice:true, equipped:true }),
        el("div",{class:"equipGroup"},[
          el("div",{class:"equipTitle"},["Bag (misc equipment and loot)"]),
          el("button",{class:"btn",type:"button",onclick:()=>openBagModal()},["Open Bag"])
        ])
      ];

      const portrait = el("div",{class:"portraitBox"},[
        eq.portraitDataUrl ? el("img",{src:eq.portraitDataUrl,alt:"portrait"}) : el("div",{},["Portrait"]),
        el("input",{type:"file",accept:"image/*",style:"position:absolute;bottom:10px;left:10px;right:10px;opacity:.9",onchange:(e)=>{
          const f = e.target.files && e.target.files[0];
          if(!f) return;
          const reader = new FileReader();
          reader.onload = ()=>{ eq.portraitDataUrl = String(reader.result||""); commitEq(); render(); };
          reader.readAsDataURL(f);
        }})
      ]);

      root.appendChild(el("div",{class:"equipCols"},[
        el("div",{},leftGroups),
        portrait,
        el("div",{},rightGroups)
      ]));
      root.appendChild(el("div",{class:"note"},["Armor + shield AC values are summed and applied to AC on both sheets. Equipped weapon hit dice is shown on both."]));
    }

    function renderSpells(){
      const spellcasting = DATA.spellcasting;
      const spellsData = DATA.spells;
      const subclasses = DATA.subclasses;

      const allSpells = Array.isArray(spellsData?.spells) ? spellsData.spells : (spellsData?.spells || spellsData || []);
      const spellById = {};
      for (const sp of allSpells) if (sp && sp.id) spellById[sp.id] = sp;

      const pClass = (state.primary?.className || "").trim();
      const pSub = (state.primary?.subclass || "").trim();
      const sClass = (state.secondary?.className || "").trim();
      const sSub = (state.secondary?.subclass || "").trim();

      const casterClasses = [];
      if (pClass) casterClasses.push({className:pClass, subclass:pSub, level: state.primary.classLevel});
      if (state.multiclass && sClass) casterClasses.push({className:sClass, subclass:sSub, level: state.secondary.classLevel});

      const known = casterClasses.some(c => isKnownCaster(c.className, c.subclass));
      const prepared = casterClasses.some(c => isPreparedCaster(c.className));
      if (!known && !prepared) { root.appendChild(el("div",{class:"note"},["No spellcasting rules apply to the selected class/subclass."])); return; }

      let maxLv = 0;
      for (const c of casterClasses) maxLv = Math.max(maxLv, maxSpellLevelFor(spellcasting, c.className, c.level));

      let allowedIds = [];
      for (const c of casterClasses) {
        allowedIds.push(...classSpellIdsUpToLevel(spellcasting, c.className, maxLv));
        allowedIds.push(...getSubclassPreparedByLevel(subclasses, c.className, c.subclass, state.level));
      }
      allowedIds = Array.from(new Set(allowedIds));

      const spellsByLevel = {};
      for (const id of allowedIds) {
        const sp = spellById[id];
        if (!sp) continue;
        const lv = Number(sp.level||0);
        spellsByLevel[lv] = spellsByLevel[lv] || [];
        spellsByLevel[lv].push(sp);
      }
      for (const lv of Object.keys(spellsByLevel)) spellsByLevel[lv].sort((a,b)=>String(a.name).localeCompare(String(b.name)));

      const preparedUnlocked = (state.rest?.preparedUnlock || 0) > 0;
      const canEditPrepared = prepared && preparedUnlocked;

      const prevLevel = clampInt(state._lastLevelSeen || state.level, 1, 20);
      if (state.level !== prevLevel) {
        const delta = state.level - prevLevel;
        if (known && delta > 0) {
          const pending = clampInt((state.spells.pendingLearn||0) + delta, 0, 99);
          writeState({ ...state, _lastLevelSeen: state.level, spells:{ ...state.spells, pendingLearn: pending }});
        } else {
          writeState({ ...state, _lastLevelSeen: state.level });
        }
      }

      let alwaysPreparedIds = [];
      for (const c of casterClasses) alwaysPreparedIds.push(...getSubclassPreparedByLevel(subclasses, c.className, c.subclass, state.level));
      alwaysPreparedIds = Array.from(new Set(alwaysPreparedIds));

      const bar = el("div",{class:"row",style:"margin-bottom:10px"},[]);
      if (prepared) {
        bar.appendChild(el("div",{class:"pill"},["Prepared list: ", el("b",{},[preparedUnlocked ? "Unlocked (after Long Rest)" : "Locked"])]));
        bar.appendChild(el("button",{class:"btn",type:"button",disabled:!preparedUnlocked,onclick:()=>{
          const nextUnlock = Math.max(0, (state.rest.preparedUnlock||0)-1);
          writeState({ ...state, rest:{ ...state.rest, preparedUnlock: nextUnlock }});
          render();
        }},["Finish preparing"]));
      }
      if (known) {
        const n = clampInt(state.spells.pendingLearn||0,0,99);
        bar.appendChild(el("div",{class:"pill"},["Spells to learn: ", el("b",{},[String(n)])]));
        if (n > 0) root.appendChild(el("div",{class:"note"},["Learning is permanent. Tap + Learn on spells to add them."]));
      }

      if (known) {
        const knownList = (state.spells.known||[]).map(id=>spellById[id]).filter(Boolean).sort((a,b)=>a.name.localeCompare(b.name));
        root.appendChild(box("Known Spells", null, [ knownList.length ? el("div",{},knownList.map(sp=>el("div",{class:"chip"},[sp.name]))) : el("div",{class:"note"},["No known spells yet."]) ]));
      }
      if (prepared) {
        const prepSet = new Set([...(state.spells.prepared||[]), ...alwaysPreparedIds]);
        const prepList = Array.from(prepSet).map(id=>spellById[id]).filter(Boolean).sort((a,b)=>a.name.localeCompare(b.name));
        root.appendChild(box("Prepared Spells", null, [ prepList.length ? el("div",{},prepList.map(sp=>el("div",{class:"chip"},[sp.name]))) : el("div",{class:"note"},["No prepared spells selected."]) ]));
      }
      if (bar.childNodes.length) root.appendChild(bar);

      for (let lv=0; lv<=maxLv; lv++){
        const title = lv===0 ? "Cantrips" : `Level ${lv}`;
        const list = spellsByLevel[lv] || [];
        const mid = Math.ceil(list.length/2);
        const left = list.slice(0, mid);
        const right = list.slice(mid);

        const colLeft = el("div",{class:"spellCol"}, left.map(sp=>spellRow(sp)));
        const colRight = el("div",{class:"spellCol"}, right.map(sp=>spellRow(sp)));
        root.appendChild(box(title, null, [ el("div",{class:"cols2fixed"},[colLeft,colRight]) ]));
      }

      root.appendChild(box("Spell Notes", null, [
        field("Notes", el("textarea", { oninput:(e)=> writeState({ ...state, spells:{ ...state.spells, notes:e.target.value }}) }, [state.spells.notes||""]))
      ]));

      function spellRow(sp){
        const isAlways = alwaysPreparedIds.includes(sp.id);
        const isPreparedNow = isAlways || (state.spells.prepared||[]).includes(sp.id);
        const isKnownNow = (state.spells.known||[]).includes(sp.id);

        const btns = el("div",{class:"row"},[]);
        if (prepared) {
          if (isAlways) btns.appendChild(el("div",{class:"pill"},["Subclass prepared"]));
          else btns.appendChild(el("button",{class:"btn",type:"button",disabled:!canEditPrepared,onclick:(e)=>{e.stopPropagation(); const set=new Set(state.spells.prepared||[]); set.has(sp.id)?set.delete(sp.id):set.add(sp.id); writeState({ ...state, spells:{ ...state.spells, prepared:[...set] }}); render();}},[isPreparedNow?"Prepared":"Prepare"]));
        }
        if (known) {
          const pending = clampInt(state.spells.pendingLearn||0,0,99);
          if (isKnownNow) btns.appendChild(el("div",{class:"pill"},["Known"]));
          else if (pending>0) btns.appendChild(el("button",{class:"btn",type:"button",onclick:(e)=>{e.stopPropagation(); const ok=confirm("Learn this spell permanently? This cannot be undone automatically."); if(!ok) return; writeState({ ...state, spells:{ ...state.spells, known:[...(state.spells.known||[]), sp.id], pendingLearn: pending-1 }}); render();}},["+ Learn"]));
        }

        const row = el("div",{class:"spellRow"},[
          el("div",{},[
            el("div",{class:"spellName"},[sp.name]),
            el("div",{class:"spellMeta2"},[`${sp.school || ""} | ${sp.castingTime || ""} | ${sp.range || ""}`])
          ]),
          btns
        ]);
        row.addEventListener("click", ()=>{
          showModal(sp.name, el("div",{},[
            el("div",{class:"note"},[safeText(sp.description||"")]),
            el("div",{class:"note"},[`Level: ${sp.level} | Duration: ${sp.duration || ""} | Components: ${sp.components || ""}`]),
          ]));
        });
        return row;
      }
    }

    async function render(){
      root.innerHTML = "";
      state = loadCharacterState();
      await ensureData();

      if (!state.rest?.hitDice) writeState({ ...state, rest:{ ...(state.rest||{}), hitDice: defaultHitDicePools(state) }});
      if (!state.equipment) writeState({ ...state, equipment: defaultEquipment() });

      if (page === "core") renderCore();
      if (page === "details") renderDetails();
      if (page === "spells") renderSpells();
      if (page === "equipment") renderEquipment();
      if (page === "notes") renderNotes();
    }

    window.addEventListener("DOMContentLoaded", async ()=>{
      await ensureData();
      render();
    });
  </script>
</body>
</html>
