<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Character Sheet</title>
<style>
:root{--bg:#0b0f14;--panel:rgba(18,26,35,.92);--border:#223041;--text:#e9eef5;--muted:#97a6b8;--accent:rgba(124,230,165,.65);}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}
header{max-width:1200px;margin:0 auto;padding:14px 14px 6px}
h1{margin:0;font-size:20px;font-weight:900}
.wrap{max-width:1200px;margin:0 auto;padding:0 14px 18px}
.panel{margin-top:10px;border-radius:16px;border:1px solid var(--border);background:var(--panel);overflow:hidden}
.topBar{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:10px 12px;border-bottom:1px solid var(--border);background:rgba(0,0,0,.10)}
.topTitle{font-weight:900}
.row{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.btn{padding:9px 10px;border-radius:12px;border:1px solid var(--border);background:rgba(26,39,53,.9);color:var(--text);cursor:pointer}
a.btn{text-decoration:none;display:inline-flex;align-items:center;justify-content:center}
.tabs{display:flex;gap:8px;flex-wrap:wrap;padding:10px 12px;border-bottom:1px solid var(--border)}
.tab{padding:8px 10px;border-radius:999px;border:1px solid var(--border);background:rgba(0,0,0,.12);color:var(--text);cursor:pointer;font-size:12px}
.tab.active{outline:2px solid var(--accent)}
.content{padding:12px}
.box{border:1px solid var(--border);border-radius:16px;background:rgba(0,0,0,.14);overflow:hidden}
.boxHead{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:10px 12px;border-bottom:1px solid var(--border)}
.boxTitle{font-weight:900}
.boxBody{padding:12px}
.note{margin-top:10px;color:var(--muted);font-size:12px;line-height:1.4}
.smallCard{border:1px solid var(--border);border-radius:14px;padding:8px;background:rgba(0,0,0,.12)}
label.field{display:grid;gap:6px;margin-top:10px}
.lbl{color:var(--muted);font-size:12px}
input,textarea,select{width:100%;padding:8px 8px;border-radius:12px;border:1px solid var(--border);background:rgba(15,22,32,.95);color:var(--text);outline:none}
textarea{min-height:140px;resize:vertical}
.equipSelector{display:flex;gap:6px;flex-wrap:wrap}
.equipCard input{padding:7px 8px;font-size:12px}
.equipCard .btn{padding:7px 8px;font-size:12px}
.modalBackdrop{position:fixed;inset:0;background:rgba(0,0,0,.65);display:none;align-items:flex-end;justify-content:center;padding:14px}
.modalBackdrop.show{display:flex}
.modal{width:100%;max-width:820px;border:1px solid var(--border);background:rgba(18,26,35,.98);border-radius:16px;overflow:hidden}
.modalHead{display:flex;justify-content:space-between;align-items:center;padding:12px;border-bottom:1px solid var(--border)}
.modalBody{padding:12px;max-height:70vh;overflow:auto}
</style>
</head>
<body>
<header><h1>Character Sheet</h1></header>
<div class="wrap">
  <div class="panel">
    <div class="topBar">
      <div class="topTitle">Character Sheet</div>
      <div class="row">
        <button class="btn" id="shortRestBtn" type="button">Short Rest</button>
        <button class="btn" id="longRestBtn" type="button">Long Rest</button>
        <button class="btn" id="cloudSaveBtn" type="button">Save to Cloud</button>
        <button class="btn" id="cloudLoadBtn" type="button">Load from Cloud</button>
        <a class="btn" href="index.html">Back</a>
      </div>
    </div>
    <div class="tabs">
      <button class="tab active" id="tabCore" type="button">Core</button>
      <button class="tab" id="tabDetails" type="button">Details</button>
      <button class="tab" id="tabSpells" type="button">Spells</button>
      <button class="tab" id="tabEquipment" type="button">Equipment</button>
      <button class="tab" id="tabNotes" type="button">Notes</button>
    </div>
    <div class="content" id="root"></div>
  </div>
</div>

<div class="modalBackdrop" id="modal">
  <div class="modal">
    <div class="modalHead">
      <div class="boxTitle" id="modalTitle">Modal</div>
      <button class="btn" id="modalClose" type="button">Close</button>
    </div>
    <div class="modalBody" id="modalBody"></div>
  </div>
</div>

<script>
(() => {
  const root = document.getElementById("root");
  const modal = document.getElementById("modal");
  const modalTitle = document.getElementById("modalTitle");
  const modalBody = document.getElementById("modalBody");
  document.getElementById("modalClose").addEventListener("click", () => closeModal());
  modal.addEventListener("click", (e) => { if (e.target === modal) closeModal(); });

  function showModal(title, bodyEl){
    modalTitle.textContent = title;
    modalBody.innerHTML = "";
    modalBody.appendChild(bodyEl);
    modal.classList.add("show");
  }
  function closeModal(){
    modal.classList.remove("show");
    modalBody.innerHTML = "";
  }

  function el(tag, attrs={}, kids=[]){
    const n = document.createElement(tag);
    for (const [k,v] of Object.entries(attrs)){
      if (k==="class") n.className = v;
      else if (k==="style") n.setAttribute("style", v);
      else if (k.startsWith("on") && typeof v === "function") n.addEventListener(k.slice(2).toLowerCase(), v);
      else if (v !== false && v != null) n.setAttribute(k, String(v));
    }
    for (const c of kids){
      if (c==null) continue;
      if (typeof c==="string") n.appendChild(document.createTextNode(c));
      else n.appendChild(c);
    }
    return n;
  }
  function field(label, control){
    return el("label",{class:"field"},[el("div",{class:"lbl"},[label]), control]);
  }
  function box(title, bodyKids){
    return el("section",{class:"box"},[
      el("div",{class:"boxHead"},[el("div",{class:"boxTitle"},[title])]),
      el("div",{class:"boxBody"}, bodyKids || [])
    ]);
  }

  const KEY = "dnd_character_state_v1";
  function loadState(){
    try{
      const raw = localStorage.getItem(KEY);
      if (!raw) return { equipment: defaultEquipment(), notes:"", details:{}, spells:{} };
      const j = JSON.parse(raw);
      j.equipment = normalizeEquipment(j.equipment || defaultEquipment());
      return j;
    }catch{
      return { equipment: defaultEquipment(), notes:"", details:{}, spells:{} };
    }
  }
  function saveState(s){
    localStorage.setItem(KEY, JSON.stringify(s));
  }

  function emptyItem(){ return {name:"",short:"",long:"",acBonus:"",hitDice:"",equipped:false}; }
  function defaultEquipment(){
    const mk=(n)=>Array.from({length:n}).map(()=>emptyItem());
    return { slots:{
      head:mk(3),neck:mk(3),body:mk(3),waist:mk(3),legs:mk(3),feet:mk(3),
      face:mk(3),shoulders:mk(3),torso:mk(3),arms:mk(3),
      ringsRight:mk(6),ringsLeft:mk(6),
      shields:mk(3),weapons:mk(6)
    }, bag:{items:[]} };
  }
  function normalizeEquipment(eq){
    const out = eq && typeof eq==="object" ? eq : defaultEquipment();
    out.slots = out.slots || {};
    const ensure=(k,n)=>{
      if(!Array.isArray(out.slots[k])) out.slots[k]=Array.from({length:n}).map(()=>emptyItem());
      while(out.slots[k].length<n) out.slots[k].push(emptyItem());
      for(let i=0;i<out.slots[k].length;i++) out.slots[k][i]=Object.assign(emptyItem(), out.slots[k][i]||{});
    };
    ["head","neck","body","waist","legs","feet","face","shoulders","torso","arms"].forEach(k=>ensure(k,3));
    ensure("ringsRight",6); ensure("ringsLeft",6);
    ensure("shields",3); ensure("weapons",6);
    out.bag = out.bag || { items: [] };
    if(!Array.isArray(out.bag.items)) out.bag.items=[];
    return out;
  }

  let page = "core";
  let equipGroupId = "head";
  const tabs = [
    ["tabCore","core"],
    ["tabDetails","details"],
    ["tabSpells","spells"],
    ["tabEquipment","equipment"],
    ["tabNotes","notes"],
  ];
  function setActive(){
    for (const [id,p] of tabs){
      const b = document.getElementById(id);
      if (!b) continue;
      b.classList.toggle("active", page===p);
    }
  }
  function bindTabs(){
    for (const [id,p] of tabs){
      const b = document.getElementById(id);
      if (!b) continue;
      b.addEventListener("click", ()=>{ page=p; setActive(); render(); });
    }
  }

  // Buttons placeholders to avoid "dead UI" feeling
  document.getElementById("shortRestBtn").addEventListener("click", ()=> alert("Short Rest popup will be here (kept stable)."));
  document.getElementById("longRestBtn").addEventListener("click", ()=> alert("Long Rest will be here (kept stable)."));
  document.getElementById("cloudSaveBtn").addEventListener("click", ()=> alert("Cloud is optional. If you want Supabase, keep js/cloud.js."));
  document.getElementById("cloudLoadBtn").addEventListener("click", ()=> alert("Cloud is optional."));

  function render(){
    const st = loadState();
    root.innerHTML = "";

    if (page==="details"){
      root.appendChild(box("Details", [
        el("div",{class:"note"},["Details section placeholder (kept stable while we iterate)."])
      ]));
      return;
    }
    if (page==="spells"){
      root.appendChild(box("Spells", [
        el("div",{class:"note"},["Spells section placeholder (kept stable while we iterate)."])
      ]));
      return;
    }
    if (page==="notes"){
      const ta = el("textarea",{oninput:(e)=>{ st.notes=e.target.value; saveState(st);} }, [st.notes||""]);
      root.appendChild(box("Notes", [ field("Notes", ta) ]));
      return;
    }
    if (page==="equipment"){
      const groups = [
        ["head","Head"],["neck","Neck"],["body","Body/Armor"],["waist","Waist"],["legs","Legs"],["feet","Feet"],
        ["face","Face"],["shoulders","Shoulders"],["torso","Torso"],["arms","Arms"],
        ["ringsRight","Rings, Right"],["ringsLeft","Rings, Left"],
        ["shields","Shields"],["weapons","Weapons"],["bag","Bag"]
      ];
      const selector = el("div",{class:"equipSelector"}, groups.map(([id,label])=>{
        const active = id===equipGroupId;
        return el("button",{class:"tab"+(active?" active":""),type:"button",onclick:()=>{ equipGroupId=id; render(); }},[label]);
      }));
      root.appendChild(box("Equipment", [selector]));

      if (equipGroupId==="bag"){
        const add = el("button",{class:"btn",type:"button",onclick:()=>{ st.equipment.bag.items.push({name:"",short:"",long:""}); saveState(st); render(); }},["+ Add item"]);
        const list = el("div",{},[]);
        st.equipment.bag.items.forEach((it,idx)=>{
          list.appendChild(el("div",{class:"smallCard equipCard",style:"margin-top:10px"},[
            field("Name", el("input",{value:it.name||"",oninput:(e)=>{it.name=e.target.value; saveState(st);}})),
            field("Short", el("input",{value:it.short||"",oninput:(e)=>{it.short=e.target.value; saveState(st);}})),
            el("div",{class:"row"},[
              el("button",{class:"btn",type:"button",onclick:()=>openLong(it)},["Open"]),
              el("button",{class:"btn",type:"button",onclick:()=>{ st.equipment.bag.items.splice(idx,1); saveState(st); render(); }},["Remove"])
            ])
          ]));
        });
        root.appendChild(box("Bag", [add, list]));
        return;
      }

      const arr = st.equipment.slots[equipGroupId] || [];
      const isArmor = equipGroupId==="body";
      const isShield = equipGroupId==="shields";
      const isWeapon = equipGroupId==="weapons";

      const cards = arr.map((it,i)=> {
        const wrap = el("div",{class:"smallCard equipCard",style:"margin-top:10px"},[
          field("Name", el("input",{value:it.name||"",oninput:(e)=>{it.name=e.target.value; saveState(st);}})),
          field("Short", el("input",{value:it.short||"",oninput:(e)=>{it.short=e.target.value; saveState(st);}})),
          el("div",{class:"row"},[
            el("button",{class:"btn",type:"button",onclick:()=>openLong(it)},["Open"])
          ])
        ]);
        if (isArmor || isShield){
          wrap.insertBefore(field("AC", el("input",{value:it.acBonus||"",oninput:(e)=>{it.acBonus=e.target.value; saveState(st);}})), wrap.children[2]);
        }
        if (isWeapon){
          wrap.insertBefore(field("Hit dice", el("input",{value:it.hitDice||"",oninput:(e)=>{it.hitDice=e.target.value; saveState(st);}})), wrap.children[2]);
          wrap.insertBefore(el("label",{class:"pill"},[
            el("input",{type:"checkbox",checked:it.equipped?true:null,onchange:(e)=>{
              for (const w of st.equipment.slots.weapons) w.equipped=false;
              it.equipped = e.target.checked;
              saveState(st);
              render();
            }}),
            "Equipped"
          ]), wrap.children[3]);
        }
        return wrap;
      });

      root.appendChild(box(groups.find(g=>g[0]===equipGroupId)[1], cards));
      return;

      function openLong(item){
        const ta = el("textarea",{},[item.long||""]);
        const saveBtn = el("button",{class:"btn",type:"button",onclick:()=>{ item.long=ta.value; saveState(st); closeModal(); }},["Save"]);
        showModal("Extended effect", el("div",{},[field("Extended effect", ta), el("div",{class:"row",style:"margin-top:10px"},[saveBtn])]));
      }
    }

    // Core
    root.appendChild(box("Core", [
      el("div",{class:"note"},["Core section placeholder (kept stable while we iterate). Use the tabs to confirm navigation stays working."])
    ]));
  }

  bindTabs();
  setActive();
  render();
})();
</script>
</body>
</html>
