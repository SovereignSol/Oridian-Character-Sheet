<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Character Sheet</title>
<style>
:root{--bg:#0b0f14;--panel:rgba(18,26,35,.92);--border:#223041;--text:#e9eef5;--muted:#97a6b8;--accent:rgba(124,230,165,.65);}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}
header{max-width:1200px;margin:0 auto;padding:14px 14px 6px}
h1{margin:0;font-size:20px;font-weight:900}
.wrap{max-width:1200px;margin:0 auto;padding:0 14px 18px}
.panel{margin-top:10px;border-radius:16px;border:1px solid var(--border);background:var(--panel);overflow:hidden}
.topBar{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:10px 12px;border-bottom:1px solid var(--border);background:rgba(0,0,0,.10)}
.topTitle{font-weight:900}
.row{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.btn{padding:9px 10px;border-radius:12px;border:1px solid var(--border);background:rgba(26,39,53,.9);color:var(--text);cursor:pointer}
a.btn{text-decoration:none;display:inline-flex;align-items:center;justify-content:center}
.tabs{display:flex;gap:8px;flex-wrap:wrap;padding:10px 12px;border-bottom:1px solid var(--border)}
.tab{padding:8px 10px;border-radius:999px;border:1px solid var(--border);background:rgba(0,0,0,.12);color:var(--text);cursor:pointer;font-size:12px}
.tab.active{outline:2px solid var(--accent)}
.content{padding:12px}
.box{border:1px solid var(--border);border-radius:16px;background:rgba(0,0,0,.14);overflow:hidden}
.boxHead{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:10px 12px;border-bottom:1px solid var(--border)}
.boxTitle{font-weight:900}
.boxBody{padding:12px}
.note{margin-top:10px;color:var(--muted);font-size:12px;line-height:1.4}
.smallCard{border:1px solid var(--border);border-radius:14px;padding:8px;background:rgba(0,0,0,.12)}
label.field{display:grid;gap:6px;margin-top:10px}
.lbl{color:var(--muted);font-size:12px}
input,textarea,select{width:100%;padding:8px 8px;border-radius:12px;border:1px solid var(--border);background:rgba(15,22,32,.95);color:var(--text);outline:none}
textarea{min-height:140px;resize:vertical}
.equipSelector{display:flex;gap:6px;flex-wrap:wrap}
.equipCard input{padding:7px 8px;font-size:12px}
.equipCard .btn{padding:7px 8px;font-size:12px}
.modalBackdrop{position:fixed;inset:0;background:rgba(0,0,0,.65);display:none;align-items:flex-end;justify-content:center;padding:14px}
.modalBackdrop.show{display:flex}
.modal{width:100%;max-width:820px;border:1px solid var(--border);background:rgba(18,26,35,.98);border-radius:16px;overflow:hidden}
.modalHead{display:flex;justify-content:space-between;align-items:center;padding:12px;border-bottom:1px solid var(--border)}
.modalBody{padding:12px;max-height:70vh;overflow:auto}
</style>
</head>
<body>

<!--
UI LABEL MAP (for editing and support)
UI1  Identity box
  UI1-1 Name input
  UI1-2 Race input
  UI1-3 Alignment input
  UI1-4 Background select
UI2  Class box
  UI2-1 Multiclass toggle
  UI2-2 Primary class block
    UI2-2-1 Class select
    UI2-2-2 Class level input
    UI2-2-3 Subclass select
  UI2-3 Secondary class block (shown when multiclass enabled)
UI3  Abilities box
  UI3-1 STR, UI3-2 DEX, UI3-3 CON, UI3-4 INT, UI3-5 WIS, UI3-6 CHA
UI4  Combat box
  UI4-1 HP Max, UI4-2 HP Now, UI4-3 Temp HP, UI4-4 AC Base, UI4-5 Speed, UI4-6 Apply Suggested HP
UI5  Skills box (each skill card uses UI5-<skillId>)
UI6  Details box
  UI6-1 Appearance, UI6-2 Backstory, UI6-3 Allies, UI6-4 Treasure
UI7  Spells summary box
UI8  Always Prepared box
UI9  Spell level boxes (UI9-L0..UI9-L9), rows use UI9-L<level>-<spellId> and controls suffix -K (Known), -P (Prepared), -V (View)
UI10 Spell Notes box
-->
<header><h1>Character Sheet</h1></header>
<div class="wrap">
  <div class="panel">
    <div class="topBar">
      <div class="topTitle">Character Sheet</div>
      <div class="row">
        <button class="btn" id="shortRestBtn" type="button">Short Rest</button>
        <button class="btn" id="longRestBtn" type="button">Long Rest</button>
        <button class="btn" id="cloudSaveBtn" type="button">Save to Cloud</button>
        <button class="btn" id="cloudLoadBtn" type="button">Load from Cloud</button>
        <a class="btn" href="index.html">Back</a>
      </div>
    </div>
    <div class="tabs">
      <button class="tab active" id="tabCore" type="button">Core</button>
      <button class="tab" id="tabDetails" type="button">Details</button>
      <button class="tab" id="tabSpells" type="button">Spells</button>
      <button class="tab" id="tabEquipment" type="button">Equipment</button>
      <button class="tab" id="tabNotes" type="button">Notes</button>
    </div>
    <div class="content" id="root"></div>
  </div>
</div>

<div class="modalBackdrop" id="modal">
  <div class="modal">
    <div class="modalHead">
      <div class="boxTitle" id="modalTitle">Modal</div>
      <button class="btn" id="modalClose" type="button">Close</button>
    </div>
    <div class="modalBody" id="modalBody"></div>
  </div>
</div>

	<script type="module">
	import {
	  loadCharacterState,
	  saveCharacterState,
	  abilityList,
	  skillMeta,
	  proficiencyBonus,
	  abilityMod,
	  formatSigned,
	} from "./js/character.js";
	import {
	  allowedSpellIds,
	  alwaysPreparedIds,
	  spellsByLevel,
	  isPreparedCaster,
	  isKnownCaster,
	} from "./js/spells_engine.js";
	import {
	  totalCharacterLevel,
	  proficiencyBonusByTotalLevel,
	  spellSlotsForState,
	  spellLimitsForState,
	  recommendedHpMax,
	  spellsKnownLimit,
	  cantripsKnownLimit,
	  preparedSpellsLimit,
	} from "./js/rules_5e2014.js";


	(() => {
  const root = document.getElementById("root");
  const modal = document.getElementById("modal");
  const modalTitle = document.getElementById("modalTitle");
  const modalBody = document.getElementById("modalBody");
  document.getElementById("modalClose").addEventListener("click", () => closeModal());
  modal.addEventListener("click", (e) => { if (e.target === modal) closeModal(); });

  function showModal(title, bodyEl){
    modalTitle.textContent = title;
    modalBody.innerHTML = "";
    modalBody.appendChild(bodyEl);
    modal.classList.add("show");
  }
  function closeModal(){
    modal.classList.remove("show");
    modalBody.innerHTML = "";
  }

  function el(tag, attrs={}, kids=[]){
    const n = document.createElement(tag);
    for (const [k,v] of Object.entries(attrs)){
      if (k==="class") n.className = v;
      else if (k==="style") n.setAttribute("style", v);
      else if (k.startsWith("on") && typeof v === "function") n.addEventListener(k.slice(2).toLowerCase(), v);
      else if (v !== false && v != null) n.setAttribute(k, String(v));
    }
    for (const c of kids){
      if (c==null) continue;
      if (typeof c==="string") n.appendChild(document.createTextNode(c));
      else n.appendChild(c);
    }
    return n;
  }
  function field(label, control, ui){
    return el("label", Object.assign({class:"field"}, ui?{"data-ui":ui}:{}),[el("div",{class:"lbl"},[label]), control]);
  }
  function box(title, bodyKids, ui){
    return el("section", Object.assign({class:"box"}, ui?{"data-ui":ui}:{}),[
      el("div",{class:"boxHead"},[el("div",{class:"boxTitle"},[title])]),
      el("div",{class:"boxBody"}, bodyKids || [])
    ]);
  }

	  function loadState(){
	    const s = loadCharacterState();
	    // Keep older equipment saves compatible with the earlier inline UI.
	    if (!s.equipment) s.equipment = defaultEquipment();
	    s.equipment = normalizeEquipment(s.equipment);
	    return s;
	  }
	  function saveState(s){
	    saveCharacterState(s);
	  }

  function emptyItem(){ return {name:"",short:"",long:"",acBonus:"",hitDice:"",equipped:false}; }
  function defaultEquipment(){
    const mk=(n)=>Array.from({length:n}).map(()=>emptyItem());
    return { slots:{
      head:mk(3),neck:mk(3),body:mk(3),waist:mk(3),legs:mk(3),feet:mk(3),
      face:mk(3),shoulders:mk(3),torso:mk(3),arms:mk(3),
      ringsRight:mk(6),ringsLeft:mk(6),
      shields:mk(3),weapons:mk(6)
    }, bag:{items:[]} };
  }
  function normalizeEquipment(eq){
    const out = eq && typeof eq==="object" ? eq : defaultEquipment();
    out.slots = out.slots || {};
    const ensure=(k,n)=>{
      if(!Array.isArray(out.slots[k])) out.slots[k]=Array.from({length:n}).map(()=>emptyItem());
      while(out.slots[k].length<n) out.slots[k].push(emptyItem());
      for(let i=0;i<out.slots[k].length;i++) out.slots[k][i]=Object.assign(emptyItem(), out.slots[k][i]||{});
    };
    ["head","neck","body","waist","legs","feet","face","shoulders","torso","arms"].forEach(k=>ensure(k,3));
    ensure("ringsRight",6); ensure("ringsLeft",6);
    ensure("shields",3); ensure("weapons",6);
    out.bag = out.bag || { items: [] };
    if(!Array.isArray(out.bag.items)) out.bag.items=[];
    return out;
  }

  let page = "core";
  let equipGroupId = "head";
  const tabs = [
    ["tabCore","core"],
    ["tabDetails","details"],
    ["tabSpells","spells"],
    ["tabEquipment","equipment"],
    ["tabNotes","notes"],
  ];
  function setActive(){
    for (const [id,p] of tabs){
      const b = document.getElementById(id);
      if (!b) continue;
      b.classList.toggle("active", page===p);
    }
  }
  function bindTabs(){
    for (const [id,p] of tabs){
      const b = document.getElementById(id);
      if (!b) continue;
      b.addEventListener("click", ()=>{ page=p; setActive(); render(); });
    }
  }

  // Buttons placeholders to avoid "dead UI" feeling
  document.getElementById("shortRestBtn").addEventListener("click", ()=> alert("Short Rest popup will be here (kept stable)."));
  document.getElementById("longRestBtn").addEventListener("click", ()=> alert("Long Rest will be here (kept stable)."));
  document.getElementById("cloudSaveBtn").addEventListener("click", ()=> alert("Cloud is optional. If you want Supabase, keep js/cloud.js."));
  document.getElementById("cloudLoadBtn").addEventListener("click", ()=> alert("Cloud is optional."));

	  // Data wiring
	  const data = {
	    classes: [],
	    subclasses: null,
	    backgrounds: null,
	    spells: null,
	    spellcasting: null,
	  };
	
	  async function fetchJson(url){
	    const r = await fetch(url, { cache: "no-store" });
	    if (!r.ok) throw new Error(`Failed to load ${url}: ${r.status}`);
	    return await r.json();
	  }
	
	  function classesForDropdown(){
	    const arr = Array.isArray(data.classes) ? data.classes : [];
	    return arr.map(x => (typeof x === "string") ? x : (x?.name || "")).filter(Boolean);
	  }
	
	  function subclassesForClass(className){
	    const c = (data.subclasses?.classes || []).find(x => x?.class === className);
	    return Array.isArray(c?.subclasses) ? c.subclasses : [];
	  }
	
	  function spellNameById(id){
	    const all = data.spells?.spells;
	    if (!Array.isArray(all)) return id;
	    const sp = all.find(s => s?.id === id);
	    return sp?.name || id;
	  }
	
	  function render(){
	    const st = loadState();
	    root.innerHTML = "";

	    if (page==="core"){
	      root.appendChild(renderCore(st));
	      return;
	    }
	    if (page==="details"){
	      root.appendChild(renderDetails(st));
	      return;
	    }
	    if (page==="spells"){
	      root.appendChild(renderSpells(st));
	      return;
	    }
    if (page==="notes"){
      const ta = el("textarea",{oninput:(e)=>{ st.notes=e.target.value; saveState(st);} }, [st.notes||""]);
      root.appendChild(box("Notes", [ field("Notes", ta) ]));
      return;
    }
    if (page==="equipment"){
      const groups = [
        ["head","Head"],["neck","Neck"],["body","Body/Armor"],["waist","Waist"],["legs","Legs"],["feet","Feet"],
        ["face","Face"],["shoulders","Shoulders"],["torso","Torso"],["arms","Arms"],
        ["ringsRight","Rings, Right"],["ringsLeft","Rings, Left"],
        ["shields","Shields"],["weapons","Weapons"],["bag","Bag"]
      ];
      const selector = el("div",{class:"equipSelector"}, groups.map(([id,label])=>{
        const active = id===equipGroupId;
        return el("button",{class:"tab"+(active?" active":""),type:"button",onclick:()=>{ equipGroupId=id; render(); }},[label]);
      }));
      root.appendChild(box("Equipment", [selector]));

      if (equipGroupId==="bag"){
        const add = el("button",{class:"btn",type:"button",onclick:()=>{ st.equipment.bag.items.push({name:"",short:"",long:""}); saveState(st); render(); }},["+ Add item"]);
        const list = el("div",{},[]);
        st.equipment.bag.items.forEach((it,idx)=>{
          list.appendChild(el("div",{class:"smallCard equipCard",style:"margin-top:10px"},[
            field("Name", el("input",{value:it.name||"",oninput:(e)=>{it.name=e.target.value; saveState(st);}})),
            field("Short", el("input",{value:it.short||"",oninput:(e)=>{it.short=e.target.value; saveState(st);}})),
            el("div",{class:"row"},[
              el("button",{class:"btn",type:"button",onclick:()=>openLong(it)},["Open"]),
              el("button",{class:"btn",type:"button",onclick:()=>{ st.equipment.bag.items.splice(idx,1); saveState(st); render(); }},["Remove"])
            ])
          ]));
        });
        root.appendChild(box("Bag", [add, list]));
        return;
      }

      const arr = st.equipment.slots[equipGroupId] || [];
      const isArmor = equipGroupId==="body";
      const isShield = equipGroupId==="shields";
      const isWeapon = equipGroupId==="weapons";

      const cards = arr.map((it,i)=> {
        const wrap = el("div",{class:"smallCard equipCard",style:"margin-top:10px"},[
          field("Name", el("input",{value:it.name||"",oninput:(e)=>{it.name=e.target.value; saveState(st);}})),
          field("Short", el("input",{value:it.short||"",oninput:(e)=>{it.short=e.target.value; saveState(st);}})),
          el("div",{class:"row"},[
            el("button",{class:"btn",type:"button",onclick:()=>openLong(it)},["Open"])
          ])
        ]);
        if (isArmor || isShield){
          wrap.insertBefore(field("AC", el("input",{value:it.acBonus||"",oninput:(e)=>{it.acBonus=e.target.value; saveState(st);}})), wrap.children[2]);
        }
        if (isWeapon){
          wrap.insertBefore(field("Hit dice", el("input",{value:it.hitDice||"",oninput:(e)=>{it.hitDice=e.target.value; saveState(st);}})), wrap.children[2]);
          wrap.insertBefore(el("label",{class:"pill"},[
            el("input",{type:"checkbox",checked:it.equipped?true:null,onchange:(e)=>{
              for (const w of st.equipment.slots.weapons) w.equipped=false;
              it.equipped = e.target.checked;
              saveState(st);
              render();
            }}),
            "Equipped"
          ]), wrap.children[3]);
        }
        return wrap;
      });

      root.appendChild(box(groups.find(g=>g[0]===equipGroupId)[1], cards));
      return;

      function openLong(item){
        const ta = el("textarea",{},[item.long||""]);
        const saveBtn = el("button",{class:"btn",type:"button",onclick:()=>{ item.long=ta.value; saveState(st); closeModal(); }},["Save"]);
        showModal("Extended effect", el("div",{},[field("Extended effect", ta), el("div",{class:"row",style:"margin-top:10px"},[saveBtn])]));
      }
    }

    // Core
    root.appendChild(box("Core", [
      el("div",{class:"note"},["Core section placeholder (kept stable while we iterate). Use the tabs to confirm navigation stays working."])
    ]));
	  }

	  function renderCore(st){
	    const left = el("div", { class: "row", style: "gap:12px; align-items:flex-start" }, [
	      el("div", { style: "flex:1; min-width:260px" }, [
	        box("Identity", [
	          field("Name", el("input", { "data-ui":"UI1-1", value: st.name || "", oninput: (e)=>{ st.name = e.target.value; saveState(st); } }), "UI1-1"),
	          field("Race", el("input", { "data-ui":"UI1-2", value: st.race || "", oninput: (e)=>{ st.race = e.target.value; saveState(st); } }), "UI1-2"),
	          field("Alignment", el("input", { "data-ui":"UI1-3", value: st.alignment || "", oninput: (e)=>{ st.alignment = e.target.value; saveState(st); } }), "UI1-3"),
	          field("Background", backgroundSelect(st,"UI1-4"), "UI1-4"),
	        ], "UI1"),
	        box("Class", [
	          classBlockEditor(st, "primary", "Primary", "UI2-2"),
	          field("Multiclass", el("select", { "data-ui":"UI2-1", onchange: (e)=>{ st.multiclass = e.target.value === "yes"; saveState(st); render(); } }), [
	            el("option", { value: "no", selected: !st.multiclass }, ["No"]),
	            el("option", { value: "yes", selected: !!st.multiclass }, ["Yes"]),
	          ])),
	          st.multiclass ? classBlockEditor(st, "secondary", "Secondary", "UI2-3") : el("div", { class: "note" }, ["Enable multiclass to add a secondary class."])
	        ], "UI2"),
	      ]),
	      el("div", { style: "flex:1; min-width:260px" }, [
	        box("Abilities", abilityList.map(a => {
	          const inp = el("input", { type: "number", min: "1", max: "30", value: String(st.abilities?.[a] ?? 10), oninput: (e)=>{
	            st.abilities = st.abilities || {};
	            st.abilities[a] = Number(e.target.value || 10);
	            saveState(st);
	            render();
	          } });
	          const mod = abilityMod(st.abilities?.[a] ?? 10);
	          return el("div", { class: "smallCard", "data-ui": "UI3-" + a }, [
	            el("div", { style: "display:flex; justify-content:space-between; align-items:center" }, [
	              el("div", { style: "font-weight:900" }, [a]),
	              el("div", { style: "color:var(--muted); font-size:12px" }, [`mod ${formatSigned(mod)}`])
	            ]),
	            inp,
	          ]);
	        })), "UI3"),
	        box("Combat", [
	          field("HP Max", el("input", { "data-ui":"UI4-1", type:"number", min:"0", max:"9999", value: String(st.combat?.hpMax ?? 10), oninput:(e)=>{ st.combat=st.combat||{}; st.combat.hpMax=Number(e.target.value||0); if(st.combat.hpNow>st.combat.hpMax) st.combat.hpNow=st.combat.hpMax; saveState(st); } }), "UI4-1"),
	          field("HP Now", el("input", { "data-ui":"UI4-2", type:"number", min:"0", max:String(st.combat?.hpMax ?? 9999), value: String(st.combat?.hpNow ?? 10), oninput:(e)=>{ st.combat=st.combat||{}; st.combat.hpNow=Number(e.target.value||0); saveState(st); } }), "UI4-2"),
	          field("Temp HP", el("input", { "data-ui":"UI4-3", type:"number", min:"0", max:"9999", value: String(st.combat?.hpTemp ?? 0), oninput:(e)=>{ st.combat=st.combat||{}; st.combat.hpTemp=Number(e.target.value||0); saveState(st); } }), "UI4-3"),
	          field("AC Base", el("input", { "data-ui":"UI4-4", type:"number", min:"0", max:"99", value: String(st.combat?.acBase ?? 10), oninput:(e)=>{ st.combat=st.combat||{}; st.combat.acBase=Number(e.target.value||0); saveState(st); } }), "UI4-4"),
	          field("Speed", el("input", { "data-ui":"UI4-5", type:"number", min:"0", max:"999", value: String(st.combat?.speed ?? 30), oninput:(e)=>{ st.combat=st.combat||{}; st.combat.speed=Number(e.target.value||0); saveState(st); } }), "UI4-5"),
	          (() => {
              const totalLv = totalCharacterLevel(st);
              const pb = proficiencyBonusByTotalLevel(totalLv);
              const slots = data.spellcasting ? spellSlotsForState(st, data.spellcasting) : null;
              const recHp = recommendedHpMax(st);
              const parts = [];
              parts.push(`Level ${totalLv} (Proficiency ${formatSigned(pb)})`);
              if (slots){
                const sc = slots.spellcastingSlots || {};
                const slotStr = Object.keys(sc).sort((a,b)=>Number(a)-Number(b)).map(k=>`${k}⟶${sc[k]}`).join(", ");
                if (slotStr) parts.push(`Spellcasting slots: ${slotStr} (caster level ${slots.effectiveSpellcasterLevel||0})`);
                if (slots.pactMagic?.slots){
                  const pm = slots.pactMagic;
                  const arc = (pm.arcanum||[]).length ? `, Arcanum ${pm.arcanum.join("/")}` : "";
                  parts.push(`Pact Magic: ${pm.slots} slot(s) at level ${pm.slotLevel}${arc}`);
                }
              }
              parts.push(`Suggested HP Max (avg): ${recHp}`);
              const body = el("div",{class:"note"},[parts.join(" | ")]);
              const btn = el("button",{class:"btn","data-ui":"UI4-6",type:"button",style:"margin-top:8px",onclick:()=>{
                st.combat=st.combat||{};
                st.combat.hpMax = recHp;
                if((st.combat.hpNow||0) > recHp) st.combat.hpNow = recHp;
                saveState(st);
                render();
              }},["Apply Suggested HP Max"]);
              return el("div",{},[body, btn]);
            })()
	        ], "UI4"),
	      ])
	    ]);
	
	    const skillsBox = box("Skills", skillMeta.map(sm => {
	      const cur = Number(st.skills?.[sm.id] || 0);
	      const sel = (val, txt) => el("option", { value: String(val), selected: cur===val }, [txt]);
	      const dd = el("select", { onchange:(e)=>{ st.skills=st.skills||{}; st.skills[sm.id]=Number(e.target.value||0); saveState(st); render(); } }, [
	        sel(0,"None"), sel(1,"Proficient"), sel(2,"Expert")
	      ]);
	      const mod = abilityMod(st.abilities?.[sm.ability] ?? 10);
	      const pb = proficiencyBonus(st.level);
	      const add = cur===1 ? pb : (cur===2 ? pb*2 : 0);
	      const total = mod + add;
	      return el("div", Object.assign({ class:"smallCard" }, uiBase?{"data-ui":uiBase}:{}), [
	        el("div", { style: "display:flex; justify-content:space-between; gap:10px; align-items:center" }, [
	          el("div", {}, [`${sm.label} `, el("span", { style:"color:var(--muted); font-size:12px" }, [`(${sm.ability})`])]),
	          el("div", { style:"color:var(--muted); font-size:12px" }, [`bonus ${formatSigned(total)}`]),
	        ]),
	        dd,
	      ]);
	    })), "UI5");
	
	    return el("div", {}, [left, el("div", { style:"margin-top:12px" }, [skillsBox])]);
	  }

	  function backgroundSelect(st, ui){
	    const bgs = Array.isArray(data.backgrounds?.backgrounds) ? data.backgrounds.backgrounds : [];
	    const sel = el("select", Object.assign({ onchange:(e)=>{ st.backgroundId = e.target.value; const bg = bgs.find(x=>x.id===st.backgroundId); st.backgroundName = bg?.name || ""; saveState(st);} }, ui?{"data-ui":ui}:{}), [
	      el("option", { value:"", selected: !st.backgroundId }, ["(none)"]),
	      ...bgs.map(bg => el("option", { value:bg.id, selected: st.backgroundId===bg.id }, [bg.name]))
	    ]);
	    return sel;
	  }

	  function classBlockEditor(st, key, label, uiBase){
	    const blk = st[key] || {};
	    const classNames = classesForDropdown();
	    const classSel = el("select", Object.assign({ onchange:(e)=>{ blk.className = e.target.value; blk.subclass = ""; st[key]=blk; saveState(st); render(); } }, [
	      el("option", { value:"", selected: !blk.className }, ["(choose)"]),
	      ...classNames.map(n => el("option", { value:n, selected: blk.className===n }, [n]))
	    ]);
	
	    const lvlInp = el("input", Object.assign({ type:"number", min:"0", max:"20", value: String(blk.classLevel ?? (key==="primary"?1:0)), oninput:(e)=>{ blk.classLevel = Number(e.target.value||0); st[key]=blk; saveState(st); render(); } }, uiBase?{"data-ui":uiBase+"-2"}:{}));
	
	    const subs = blk.className ? subclassesForClass(blk.className) : [];
	    const subSel = el("select", Object.assign({ onchange:(e)=>{ blk.subclass = e.target.value; const chosen = subs.find(x=>x.name===blk.subclass); blk.subclassPackageUrl = chosen?.packageUrl || ""; st[key]=blk; saveState(st); render(); } }), [
	      el("option", { value:"", selected: !blk.subclass }, ["(none)"]),
	      ...subs.map(su => el("option", { value:su.name, selected: blk.subclass===su.name }, [su.name]))
	    ]);
	
	    return el("div", { class:"smallCard" }, [
	      el("div", { style:"font-weight:900; margin-bottom:6px" }, [label]),
	      field("Class", classSel, uiBase?uiBase+"-1":""),
	      field("Class Level", lvlInp, uiBase?uiBase+"-2":""),
	      field("Subclass", subSel, uiBase?uiBase+"-3":""),
	    ], "UI6");
	  }

	  function renderDetails(st){
	    st.details = st.details || {};
	    const mkTa = (key, ui) => el("textarea", Object.assign({ oninput:(e)=>{ st.details[key]=e.target.value; saveState(st); } }, ui?{"data-ui":ui}:{}), [String(st.details[key]||"")]);
	    return box("Details", [
	      field("Appearance", mkTa("appearance","UI6-1"), "UI6-1"),
	      field("Backstory", mkTa("backstory","UI6-2"), "UI6-2"),
	      field("Allies", mkTa("allies","UI6-3"), "UI6-3"),
	      field("Treasure", mkTa("treasure","UI6-4"), "UI6-4"),
	    ]);
	  }

	  
function renderSpells(st){
	    const hasData = !!(data.spellcasting && data.subclasses && data.spells);
	    if (!hasData) {
	      return box("Spells", [el("div", { class:"note" }, ["Spell data is still loading."])]);
	    }

	    // Back-compat: allow old saves where known/prepared were arrays of string ids.
	    st.spells = st.spells || { known: [], prepared: [], pendingLearn: 0, notes: "" };
	    if (!Array.isArray(st.spells.known)) st.spells.known = [];
	    if (!Array.isArray(st.spells.prepared)) st.spells.prepared = [];
	    const normalizeArr = (arr) => arr.map(x => (typeof x === "string") ? ({ id:x, source:"" }) : x).filter(x => x && typeof x.id === "string");
	    st.spells.known = normalizeArr(st.spells.known);
	    st.spells.prepared = normalizeArr(st.spells.prepared);

	    const blocks = [
	      { label:"Primary", ...st.primary },
	      st.multiclass ? { label:"Secondary", ...st.secondary } : null,
	    ].filter(Boolean);

	    const blockAllowedSets = new Map();
	    const blockMaxSpellLevel = new Map();
	    for (const b of blocks){
	      const className = (b.className || "").trim();
	      const subName = (b.subclass || "").trim();
	      const classLevel = Number(b.classLevel || 0);
	      if (!className || classLevel <= 0) {
	        blockAllowedSets.set(b.label, new Set());
	        blockMaxSpellLevel.set(b.label, 0);
	        continue;
	      }

	      let progression = data.spellcasting?.classes?.[className]?.progression || null;
	      const sub = (data.subclasses?.classes || []).find(x => x?.class === className)?.subclasses?.find(s => s?.name === subName) || null;
	      if (sub?.spellRules?.progression) progression = sub.spellRules.progression;

	      const prog = data.spellcasting?.progressions?.[progression];
	      const maxLv = Number(prog?.maxSpellLevel?.[String(classLevel)] || 0);

	      let list = data.spellcasting?.classes?.[className]?.spellListByLevel || null;
	      if (sub?.spellRules?.spellSourceClass){
	        const src = sub.spellRules.spellSourceClass;
	        list = data.spellcasting?.classes?.[src]?.spellListByLevel || list;
	      }

	      const set = new Set();
	      if (list){
	        for (let lv=0; lv<=maxLv; lv++){
	          const arr = list[String(lv)] || [];
	          for (const s of arr) set.add(s.id);
	        }
	      }
	      blockAllowedSets.set(b.label, set);
	      blockMaxSpellLevel.set(b.label, maxLv);
	    }

	    const allowed = allowedSpellIds(st, data.spellcasting, data.subclasses);
	    const always = alwaysPreparedIds(st, data.subclasses);
	    const catalog = (data.spells?.spells) ? data.spells.spells : (Array.isArray(data.spells) ? data.spells : []);
	    const spellById = new Map(catalog.map(s => [s.id, s]));
	    const map = spellsByLevel(data.spells, allowed);
	    const levels = Array.from(map.keys()).sort((a,b)=>a-b);

	    const limits = spellLimitsForState(st);
	    const slots = spellSlotsForState(st, data.spellcasting);

	    const summaryLines = [];
	    const totalLv = totalCharacterLevel(st);
	    summaryLines.push(`Total level ${totalLv}, proficiency ${formatSigned(proficiencyBonusByTotalLevel(totalLv))}.`);
	    if (slots?.effectiveSpellcasterLevel){
	      const sc = slots.spellcastingSlots || {};
	      const slotStr = Object.keys(sc).sort((a,b)=>Number(a)-Number(b)).map(k=>`${k}⟶${sc[k]}`).join(", ");
	      if (slotStr) summaryLines.push(`Spellcasting slots: ${slotStr} (caster level ${slots.effectiveSpellcasterLevel}).`);
	    }
	    if (slots?.pactMagic?.slots){
	      const pm = slots.pactMagic;
	      const arc = (pm.arcanum||[]).length ? `, Mystic Arcanum ${pm.arcanum.join("/")}` : "";
	      summaryLines.push(`Pact Magic: ${pm.slots} slot(s), slot level ${pm.slotLevel}${arc}.`);
	    }

	    const limitLines = limits.map(l => {
	      const parts = [];
	      if (Number.isFinite(l.knownSpellsMax)) parts.push(`Known ${l.knownSpellsMax}`);
	      if (Number.isFinite(l.preparedSpellsMax)) parts.push(`Prepared ${l.preparedSpellsMax}`);
	      if (Number.isFinite(l.cantripsKnownMax)) parts.push(`Cantrips ${l.cantripsKnownMax}`);
	      const p = parts.length ? parts.join(", ") : "No spell limits tracked";
	      return `${l.label}: ${l.className} ${l.classLevel} (${p})`;
	    });

	    const top = el("div", { class:"note" }, [
	      ...summaryLines,
	      limitLines.length ? "\n" + limitLines.join("\n") : "\nPick a class on the Core tab to enable spell selection.",
	    ]);

	    function inferSourceForSpell(id){
	      const pSet = blockAllowedSets.get("Primary") || new Set();
	      const sSet = blockAllowedSets.get("Secondary") || new Set();
	      if (pSet.has(id)) return (st.primary?.className || "").trim();
	      if (sSet.has(id)) return (st.secondary?.className || "").trim();
	      return (st.primary?.className || "").trim();
	    }

	    function countKnownForClass(className){
	      const name = (className||"").trim();
	      let cantrips = 0, leveled = 0;
	      for (const k of st.spells.known){
	        const sp = spellById.get(k.id);
	        if (!sp) continue;
	        if ((k.source||"") && (k.source||"")!==name) continue;
	        if (Number(sp.level) === 0) cantrips++;
	        else leveled++;
	      }
	      return { cantrips, leveled };
	    }

	    function countPreparedForClass(className){
	      const name = (className||"").trim();
	      let prepared = 0;
	      for (const p of st.spells.prepared){
	        const sp = spellById.get(p.id);
	        if (!sp) continue;
	        if ((p.source||"") && (p.source||"")!==name) continue;
	        if (always.includes(p.id)) continue;
	        if (Number(sp.level) === 0) continue;
	        prepared++;
	      }
	      return prepared;
	    }

	    function canToggleKnown(id, sourceClass){
	      const sp = spellById.get(id);
	      if (!sp) return false;
	      if (Number(sp.level) === 0){
	        const lim = cantripsKnownLimit(sourceClass, sourceClass === (st.primary?.className||"").trim() ? Number(st.primary?.classLevel||0) : Number(st.secondary?.classLevel||0));
	        if (!Number.isFinite(lim)) return true;
	        const cur = countKnownForClass(sourceClass).cantrips;
	        return cur < lim;
	      } else {
	        const lim = spellsKnownLimit(sourceClass, sourceClass === (st.primary?.className||"").trim() ? Number(st.primary?.classLevel||0) : Number(st.secondary?.classLevel||0));
	        if (!Number.isFinite(lim)) return true;
	        const cur = countKnownForClass(sourceClass).leveled;
	        return cur < lim;
	      }
	    }

	    function canTogglePrepared(id, sourceClass){
	      const sp = spellById.get(id);
	      if (!sp) return false;
	      if (Number(sp.level) === 0) return true;
	      const block = (sourceClass === (st.primary?.className||"").trim()) ? st.primary : st.secondary;
	      const lim = preparedSpellsLimit({ className: sourceClass, classLevel: Number(block?.classLevel||0), spellAbilityMod: Number(block?.spellMod||0) });
	      if (!Number.isFinite(lim)) return true;
	      const cur = countPreparedForClass(sourceClass);
	      return cur < lim;
	    }

	    const alwaysBox = always.length
	      ? box("Always Prepared", [
	          el("div", { class:"note" }, ["Granted by subclass rules. They do not count against prepared limits."]),
	          el("ul", {}, always.map(id => el("li", {}, [spellNameById(id)])))
	        ], "UI8")
	      : null;

	    const list = levels.length ? levels.map(lv => {
	      const arr = map.get(lv) || [];
	      const title = lv === 0 ? "Cantrips" : `Level ${lv}`;
	      const rows = arr.map(sp => {
	        const id = sp.id;
	        const source = inferSourceForSpell(id);

	        const knownObj = st.spells.known.find(x => x.id === id);
	        const known = !!knownObj;
	        const preparedObj = st.spells.prepared.find(x => x.id === id);
	        const prepared = !!preparedObj || always.includes(id);

	        const knownDisabled = known ? false : !canToggleKnown(id, source);
	        const prepDisabled = always.includes(id) ? true : (prepared ? false : !canTogglePrepared(id, source));

	        const knownCb = el("input", { "data-ui":"UI9-L"+lv+"-"+id+"-K", type:"checkbox", checked: known, disabled: knownDisabled, onchange:(e)=>{
	          if (e.target.checked) {
	            if (!st.spells.known.find(x=>x.id===id)) st.spells.known.push({ id, source });
	          } else {
	            st.spells.known = st.spells.known.filter(x=>x.id!==id);
	            st.spells.prepared = st.spells.prepared.filter(x=>x.id!==id);
	          }
	          saveState(st);
	          render();
	        }});

	        const prepCb = el("input", { "data-ui":"UI9-L"+lv+"-"+id+"-P", type:"checkbox", checked: prepared, disabled: prepDisabled, onchange:(e)=>{
	          if (e.target.checked) {
	            if (!st.spells.prepared.find(x=>x.id===id)) st.spells.prepared.push({ id, source });
	          } else {
	            st.spells.prepared = st.spells.prepared.filter(x=>x.id!==id);
	          }
	          saveState(st);
	          render();
	        }});

	        const infoBtn = el("button", { class:"btn", "data-ui":"UI9-L"+lv+"-"+id+"-V", type:"button", onclick:()=>{
	          const body = el("div", {}, [
	            el("div", { class:"note" }, [`${sp.school || ""} | cast ${sp.castingTime || ""} | range ${sp.range || ""} | duration ${sp.duration || ""}`]),
	            el("pre", { style:"white-space:pre-wrap; margin:0; font-family:inherit" }, [String(sp.description || sp.descrip || "")]),
	          ]);
	          showModal(sp.name, body);
	        }}, ["View"]);

	        return el("div", { class:"smallCard", "data-ui": "UI9-L"+lv+"-"+id }, [
	          el("div", { style:"display:flex; justify-content:space-between; align-items:center; gap:10px" }, [
	            el("div", {}, [
	              el("div", { style:"font-weight:900" }, [sp.name]),
	              el("div", { style:"color:var(--muted); font-size:12px" }, [`Source: ${source || "?"}`]),
	            ]),
	            el("div", { style:"display:flex; gap:10px; align-items:center" }, [
	              el("label", { style:"display:flex; gap:6px; align-items:center; font-size:12px" }, [knownCb, "Known"]),
	              el("label", { style:"display:flex; gap:6px; align-items:center; font-size:12px" }, [prepCb, "Prepared"]),
	              infoBtn,
	            ]),
	          ]),
	        ]);
	      });
	      return box(title, rows.length ? rows : [el("div",{class:"note"},["No spells at this level."])], "UI9-L"+lv);
	    }) : [el("div",{class:"note"},["Pick a class and levels on the Core tab to populate spell options."])];

	    const notesTa = el("textarea",{"data-ui":"UI10-1", oninput:(e)=>{ st.spells.notes = e.target.value; saveState(st);} }, [st.spells.notes||""]);

	    return el("div", {}, [
	      box("Spells", [top], "UI7"),
	      alwaysBox,
	      ...list,
	      box("Spell Notes", [ field("Notes", notesTa, "UI10-1") ], "UI10")
	    ].filter(Boolean));
	  }


	  async function init(){
	    bindTabs();
	    setActive();
	    try{
	      const [classes, backgrounds, subclasses, spells, spellcasting] = await Promise.all([
	        fetchJson("./data/classes.json"),
	        fetchJson("./data/backgrounds.json"),
	        fetchJson("./data/subclasses.json"),
	        fetchJson("./data/spells.json"),
	        fetchJson("./data/spellcasting.json"),
	      ]);
	      data.classes = classes;
	      data.backgrounds = backgrounds;
	      data.subclasses = subclasses;
	      data.spells = spells;
	      data.spellcasting = spellcasting;
	    }catch(err){
	      console.error("Data init failed", err);
	    }
	    render();
	  }

	  document.addEventListener("DOMContentLoaded", init);
})();
</script>
</body>
</html>
